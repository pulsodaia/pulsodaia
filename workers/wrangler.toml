# Cloudflare Worker — Pulso da IA GHL bridge
#
# Deploy:
#   cd workers && npx wrangler deploy
#
# Secrets (set once, NAO commitar):
#   cd workers && npx wrangler secret put GA4_API_SECRET
#   cd workers && npx wrangler secret put GHL_LOCATION_PIT
#   cd workers && npx wrangler secret put GHL_WEBHOOK_SECRET   (opcional)
#
# Worker fica disponivel em:
#   https://ghl-bridge.<account-subdomain>.workers.dev
#
# Quando pulsodaia.com.br propagar pra CF DNS, adicionar rota:
#   routes = [{ pattern = "pulsodaia.com.br/api/*", zone_name = "pulsodaia.com.br" }]

name = "ghl-bridge"
main = "ghl-bridge.js"
compatibility_date = "2025-01-01"
account_id = "5ec238b420a9e6b7e78efdde132b4291"

# Habilita URL workers.dev
workers_dev = true

[vars]
GA4_MEASUREMENT_ID = "G-32GWZHPJGJ"

[observability]
enabled = true
