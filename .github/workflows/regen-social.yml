name: Regenerar Social Cards (formato variado)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto (so artigos sem COVER_HERO/tipos variados)'
          - 'all (TODOS os artigos)'
          - 'dry-run (so lista alvos)'
      limit:
        description: 'Max artigos por run (pra nao estourar quota Gemini)'
        required: false
        default: '5'

permissions:
  contents: write

concurrency:
  group: regen-social
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regen
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          REGEN_LIMIT: ${{ inputs.limit }}
        run: |
          EXTRA=""
          case "${{ inputs.mode }}" in
            "all (TODOS os artigos)") EXTRA="--all" ;;
            "dry-run (so lista alvos)") EXTRA="--dry-run" ;;
          esac
          node scripts/regen-social-cards.js $EXTRA 2>&1 | tee /tmp/regen.log

      - name: Commit
        run: |
          git config user.name "pulso-autopilot[bot]"
          git config user.email "autopilot@pulsodaia.com.br"
          git add -A
          if git diff --cached --quiet; then
            echo "nada novo"
            exit 0
          fi
          git commit -m "refactor(social): regenera cards com formato variado (COVER_HERO + STAT/QUOTE/LIST) [skip ci]"
          for attempt in 1 2 3; do
            if git push origin main; then break; fi
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep 3
          done

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_PROJECT: pulsodaia
          PAGES_BRANCH: main
        run: node deploy.js || echo "[deploy] falhou"

      - name: Summary
        if: always()
        run: |
          echo "### Regen Social — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 /tmp/regen.log >> $GITHUB_STEP_SUMMARY 2>/dev/null
          echo '```' >> $GITHUB_STEP_SUMMARY
