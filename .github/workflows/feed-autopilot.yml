name: Feed Autopilot

on:
  schedule:
    # A cada 2 horas, 5 minutos apos hora cheia (evita 00:00 que tem muito trafego CI)
    - cron: '5 */2 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max artigos por rodada'
        required: false
        default: '3'
      force_publish:
        description: 'Publicar mesmo com score baixo'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

concurrency:
  group: feed-autopilot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run feed-engine
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          GA4_MEASUREMENT_ID: G-32GWZHPJGJ
          GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
        run: |
          TIME_START=$(date +%s)
          LIMIT="${{ inputs.limit || '3' }}"
          FORCE="${{ inputs.force_publish || 'false' }}"
          EXTRA=""
          if [ "$FORCE" = "true" ]; then EXTRA="--publish"; fi
          node scripts/feed-engine.js --limit="$LIMIT" $EXTRA | tee /tmp/engine.log
          TIME_END=$(date +%s)
          DURATION=$((TIME_END - TIME_START))
          COUNT=$(grep -c "PUBLICADO" /tmp/engine.log || echo "0")
          # MP event: autopilot_run (best-effort, nao falha se secret missing)
          node -e "
            const { mpEvent } = require('./scripts/measurement-protocol.js');
            mpEvent('autopilot_run', {
              articles_published: $COUNT,
              duration_seconds: $DURATION,
              force_publish: '$FORCE',
              limit: $LIMIT
            }).then(r => console.log('[MP] autopilot_run:', r.ok)).catch(() => {});
          " || echo "[MP] skip"

      - name: Generate social posts (novos artigos)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
        run: |
          # Gera social apenas pra artigos SEM pasta social/{slug}/ ainda (nao --force)
          # generate-social-posts.js ja invoca render-ig-cards.js internamente
          node scripts/generate-social-posts.js | tee /tmp/social.log || echo "[social] falhou, nao eh critico"

      - name: Create GHL Social Planner drafts (FB/IG/Pinterest/Bluesky)
        env:
          GHL_LOCATION_PIT: ${{ secrets.GHL_LOCATION_PIT }}
          GHL_USER_ID: ${{ secrets.GHL_USER_ID }}
        run: |
          # So cria drafts pra artigos que AINDA nao tem ghl_posts no meta.json
          if [ -n "$GHL_LOCATION_PIT" ]; then
            node scripts/ghl-social-post.js --all 2>&1 | tee -a /tmp/social.log || echo "[ghl] falhou, nao eh critico"
          else
            echo "[ghl] GHL_LOCATION_PIT secret nao configurado — skip"
          fi

      - name: Render short videos (FFmpeg 9:16 MP4 dos cards)
        run: |
          # Instala ffmpeg + renderiza video pra artigos SEM assets/videos/{slug}/short.mp4
          sudo apt-get update -qq && sudo apt-get install -y ffmpeg -qq 2>&1 | tail -3
          for meta in social/*/meta.json; do
            slug=$(basename $(dirname "$meta"))
            card_dir="assets/ig-cards/$slug"
            video="assets/videos/$slug/short.mp4"
            if [ -d "$card_dir" ] && [ ! -f "$video" ]; then
              echo "[video] renderizando $slug..."
              node scripts/render-video.js --slug="$slug" 2>&1 | tail -3 || echo "[video] $slug falhou"
            fi
          done

      - name: Rebuild RSS + static pages (pega novos artigos)
        run: |
          node scripts/build-static-pages.js | tee -a /tmp/engine.log || echo "[build-pages] falhou, nao eh critico"

      - name: Check if anything changed
        id: changes
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "[autopilot] nada novo, nada a commitar"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git status --short
          fi

      - name: Commit new articles
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "pulso-autopilot[bot]"
          git config user.email "autopilot@pulsodaia.com.br"
          git add -A
          COUNT=$(grep -c "PUBLICADO" /tmp/engine.log || echo "0")
          git commit -m "chore(autopilot): $COUNT artigo(s) novo(s) [skip ci]" || echo "nada a commitar"
          # Retry push com rebase em caso de conflito de outros commits paralelos
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "[autopilot] push ok (attempt $attempt)"
              break
            fi
            echo "[autopilot] push falhou (attempt $attempt), rebase e retry..."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "[autopilot] rebase conflitou, abortando"; exit 1; }
            sleep 3
          done

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_PROJECT: pulsodaia
          PAGES_BRANCH: main
        run: |
          node deploy.js

      - name: Summary
        if: always()
        run: |
          echo "### Feed Autopilot — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "Status: novos artigos publicados e deployados" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: nada novo coletado" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Log:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 /tmp/engine.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(sem log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
