name: Veo Hero Daily

on:
  schedule:
    # 1x/dia, 20h UTC = 17h BRT (pega artigos do dia)
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug especifico (opcional — auto-seleciona TOP do dia se vazio)'
        required: false
      dry_run:
        description: 'Dry run (sem chamar API, so simulacao)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

concurrency:
  group: veo-hero-daily
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Render Veo hero
        env:
          VEO_ENABLED: 'true'
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          VEO_MODEL: veo-3.0-fast-generate-001
          VEO_BUDGET_MONTHLY_BRL: '200'
          VEO_USD_TO_BRL: '5.0'
          VEO_COST_PER_SECOND_USD: '0.08'
          GEMINI_MODEL: gemini-2.5-flash-lite
        run: |
          EXTRA=""
          if [ -n "${{ inputs.slug }}" ]; then EXTRA="--slug=${{ inputs.slug }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then EXTRA="$EXTRA --dry-run"; fi
          node scripts/render-veo-hero.js $EXTRA 2>&1 | tee /tmp/veo.log

      - name: Commit video + spend
        run: |
          git config user.name "pulso-autopilot[bot]"
          git config user.email "autopilot@pulsodaia.com.br"
          git add -A
          if git diff --cached --quiet; then
            echo "[veo] nada novo"
            exit 0
          fi
          git commit -m "feat(veo): hero cinematico via Veo 3 Fast [skip ci]"
          for attempt in 1 2 3; do
            if git push origin main; then break; fi
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep 3
          done

      - name: Deploy to Cloudflare
        if: success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_PROJECT: pulsodaia
          PAGES_BRANCH: main
        run: node deploy.js || echo "[deploy] falhou, nao eh critico"

      - name: Summary
        if: always()
        run: |
          echo "### Veo Hero — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -40 /tmp/veo.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(sem log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
